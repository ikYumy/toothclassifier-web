<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ToothClassifier — 高光谱牙齿组织推理</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #e3b341;
    --red: #f85149;
    --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 16px;
  }
  .container { max-width: 600px; width: 100%; }
  h1 { font-size: 1.5rem; text-align: center; margin-bottom: 16px; }
  h1 span { color: var(--muted); font-weight: 400; font-size: 0.9rem; display: block; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .card h2 { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

  select, button, input[type=file] {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    font-size: 0.95rem; font-family: inherit;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    margin-top: 6px;
  }
  select:focus, button:focus { outline: none; border-color: var(--accent); }

  button {
    background: var(--accent); color: #fff; font-weight: 600;
    cursor: pointer; border: none; margin-top: 10px;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  button.danger { background: var(--red); }
  button.purple { background: var(--purple); }

  .status {
    font-size: 0.85rem; color: var(--muted); text-align: center;
    min-height: 20px; margin: 8px 0;
  }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }

  canvas {
    width: 100%; border-radius: 8px;
    border: 1px solid var(--border);
    image-rendering: auto;
    margin-top: 8px;
  }

  .canvas-container {
    position: relative;
    margin-top: 8px;
  }
  .canvas-container canvas {
    position: absolute;
    top: 0; left: 0;
  }
  .canvas-container canvas#rgbCanvas {
    position: relative;
    z-index: 1;
  }
  .canvas-container canvas#drawCanvas {
    z-index: 2;
  }

  .roi-controls {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .roi-controls button { margin-top: 0; }

  .progress-bar {
    height: 4px; background: var(--border); border-radius: 2px;
    margin-top: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s;
    width: 0%;
  }

  .stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-top: 8px;
  }
  .stat {
    background: var(--bg); border-radius: 8px; padding: 10px;
    text-align: center;
  }
  .stat .value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .legend {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
    font-size: 0.75rem;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .warning {
    background: rgba(227,179,65,0.1); border: 1px solid var(--yellow);
    border-radius: 8px; padding: 10px; font-size: 0.8rem;
    color: var(--yellow); margin-bottom: 12px; text-align: center;
  }
  .hint {
    font-size: 0.75rem; color: var(--muted); margin-top: 4px; text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🦷 ToothClassifier
    <span>高光谱牙齿组织分类 · 边缘推理</span>
  </h1>

  <div class="warning" id="safariWarning" style="display:none">
    ⚠️ 检测到非 Safari 浏览器。推荐使用 <b>Safari</b> 以获得最佳 WebAssembly 性能。
  </div>

  <!-- 模型选择 -->
  <div class="card">
    <h2>模型</h2>
    <select id="modelSelect">
      <option value="resnet_original" selected>ResNet-1D original (★推荐 OA≈0.944)</option>
      <option value="resnet_deriv">ResNet-1D deriv</option>
      <option value="resnet_original_se">ResNet-1D original + SE</option>
      <option value="resnet_deriv_se">ResNet-1D deriv + SE</option>
      <option value="efficientnet_original">EfficientNet-1D original</option>
      <option value="efficientnet_deriv">EfficientNet-1D deriv</option>
      <option value="simple_original">SimpleCNN original</option>
      <option value="vgg_original">VGG-1D original</option>
    </select>
    <div class="status" id="modelStatus">点击"加载模型"开始</div>
  </div>

  <!-- 操作 -->
  <div class="card">
    <h2>操作</h2>
    <button id="loadModelBtn" onclick="loadModel()">加载模型</button>
    <button id="runBtn" class="secondary" onclick="selectFiles()" disabled>选择 HDR + .dat 文件加载图像</button>
    <button id="inferROIBtn" class="purple" onclick="runROIInference()" disabled style="display:none">推理圈选区域</button>
    <button id="inferAllBtn" class="secondary" onclick="runFullInference()" disabled style="display:none">推理整幅图像</button>
    <input type="file" id="fileInput" accept=".hdr,.dat,.img" multiple style="display:none" onchange="handleFiles(event)">
    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <!-- RGB 预览 + ROI 圈画 -->
  <div class="card" id="previewCard" style="display:none">
    <h2>RGB 预览 (R:639.63 / G:551 / B:468.9 nm) — 圈画需要推理的区域</h2>
    <div class="canvas-container" id="canvasContainer">
      <canvas id="rgbCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
    <div class="hint">👆 用手指/鼠标在图上圈画 ROI 区域（可多次绘制）</div>
    <div class="roi-controls">
      <button id="clearROIBtn" class="secondary" onclick="clearROI()" style="flex:1">清除选区</button>
      <button id="undoROIBtn" class="secondary" onclick="undoLastROI()" style="flex:1">撤销最后选区</button>
    </div>
  </div>

  <!-- 结果 -->
  <div class="card" id="resultsCard" style="display:none">
    <h2>推理结果</h2>
    <canvas id="resultCanvas"></canvas>
    <div class="stats" id="stats"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#000"></div>背景</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f00"></div>釉质</div>
      <div class="legend-item"><div class="legend-dot" style="background:#008b00"></div>早期龋</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00f"></div>进展龋</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff0"></div>牙结石</div>
    </div>
    <button class="secondary" onclick="saveResult()" style="margin-top:10px">保存结果到相册</button>
  </div>
</div>

<!-- ONNX Runtime Web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.webgpu.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  全局状态
// ═══════════════════════════════════════════════════════════
let ortSession = null;
let currentModel = '';
let modelData = null;

const BANDS = 244;
const NOISE_START = 6;
const NOISE_END = 6;
const NUM_CLASSES = 5;
const BATCH_SIZE = 1024;

const GLOBAL_MEAN = 0.330996;
const GLOBAL_STD  = 0.201596;

const TARGET_R = 639.63;
const TARGET_G = 551.00;
const TARGET_B = 468.90;

const COLOR_MAP = [
  [0,   0,   0],   // background
  [255, 0,   0],   // enamel
  [0,   139, 0],   // early lesion
  [0,   0,   255], // developed lesion
  [255, 255, 0],   // calculus
];

const MODEL_CONFIGS = {
  resnet_original:    { channels: 1, deriv: false },
  resnet_original_se: { channels: 1, deriv: false },
  resnet_deriv:       { channels: 3, deriv: true },
  resnet_deriv_se:    { channels: 3, deriv: true },
  efficientnet_original:    { channels: 1, deriv: false },
  efficientnet_deriv:       { channels: 3, deriv: true },
  simple_original:    { channels: 1, deriv: false },
  vgg_original:       { channels: 1, deriv: false },
};

// 存储图像数据供后续推理使用
let storedH = 0, storedW = 0, storedBands = 0;
let storedRawData = null;      // 未归一化的原始数据（BSQ pixel-major）
let storedNormalizedData = null; // 已归一化的数据
let storedWavelengths = null;   // 波长数组（已裁剪至244）

// ROI 状态
let roiPolygons = [];     // 存储多个多边形 [{points: [{x,y},...]}]
let currentPolygon = [];  // 当前正在绘制的多边形
let isDrawing = false;
let roiMask = null;       // Uint8Array [nPixels], 1=在ROI内


// ═══════════════════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  if (!isSafari) {
    document.getElementById('safariWarning').style.display = 'block';
  }
  checkORT();
  setupDrawCanvas();
});

async function checkORT() {
  const status = document.getElementById('modelStatus');
  try {
    const available = typeof ort !== 'undefined';
    status.textContent = available ? 'ONNX Runtime Web 已就绪 ✓' : '正在加载 ONNX Runtime...';
    status.className = available ? 'status ok' : 'status';
  } catch(e) {
    status.textContent = 'ONNX Runtime 加载失败: ' + e.message;
    status.className = 'status err';
  }
}


// ═══════════════════════════════════════════════════════════
//  模型加载
// ═══════════════════════════════════════════════════════════
async function loadModel() {
  const select = document.getElementById('modelSelect');
  const modelName = select.value;
  const status = document.getElementById('modelStatus');
  const btn = document.getElementById('loadModelBtn');

  btn.disabled = true;
  status.textContent = `正在加载 ${modelName}...`;
  status.className = 'status';

  try {
    const resp = await fetch(`onnx_models/${modelName}.onnx`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buffer = await resp.arrayBuffer();
    modelData = new Uint8Array(buffer);

    ortSession = await ort.InferenceSession.create(modelData, {
      executionProviders: ['webgl', 'wasm'],
      graphOptimizationLevel: 'all',
    });
    currentModel = modelName;

    status.textContent = `✓ ${modelName} 已加载 (${MODEL_CONFIGS[modelName].channels}通道)`;
    status.className = 'status ok';
    document.getElementById('runBtn').disabled = false;
  } catch(e) {
    status.textContent = `加载失败: ${e.message}`;
    status.className = 'status err';
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}


// ═══════════════════════════════════════════════════════════
//  文件选择
// ═══════════════════════════════════════════════════════════
function selectFiles() {
  document.getElementById('fileInput').click();
}

async function handleFiles(event) {
  const files = event.target.files;
  if (!files || files.length < 2) {
    alert('请同时选择 .hdr 文件和对应的 .dat/.img 数据文件');
    return;
  }

  let hdrFile = null, datFile = null;
  for (const f of files) {
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext === 'hdr') hdrFile = f;
    else if (ext === 'dat' || ext === 'img') datFile = f;
  }

  if (!hdrFile) { alert('未找到 .hdr 文件'); return; }
  if (!datFile) { alert('未找到 .dat/.img 二进制数据文件'); return; }

  const status = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');

  status.textContent = '正在读取 HDR 文件...';
  status.className = 'status';
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';

  // 隐藏之前的结果
  document.getElementById('resultsCard').style.display = 'none';

  try {
    // 1. 解析 HDR
    const hdrText = await hdrFile.text();
    const hdr = parseHDRHeader(hdrText);
    const H = hdr.lines, W = hdr.samples, B = hdr.bands;
    if (!H || !W || !B) throw new Error('HDR 文件格式错误：缺少 samples/lines/bands');
    status.textContent = `图像: ${H}×${W}×${B} 波段`;

    // 2. 读取二进制并重排
    const datBuffer = await datFile.arrayBuffer();
    const totalElements = H * W * B;
    let rawData = parseBinaryData(datBuffer, hdr.dataType, hdr.byteOrder, totalElements);
    rawData = reorderToBSQ(rawData, H, W, B, hdr.interleave);

    // 3. 保存原始数据（用于 RGB 预览，在裁剪/归一化前）
    // 对原始数据做深拷贝
    let rawDataForRGB = new Float32Array(rawData);

    // 4. 处理波长
    let wavelengthsRaw = hdr.wavelengths;
    let fullBandCount = B;

    // 5. 波段裁剪
    let bandsToUse = B;
    if (B === 256) {
      rawData = cropBands(rawData, H, W, B);
      rawDataForRGB = cropBands(rawDataForRGB, H, W, B);
      if (wavelengthsRaw && wavelengthsRaw.length === 256) {
        wavelengthsRaw = wavelengthsRaw.slice(NOISE_START, NOISE_START + 244);
      }
      bandsToUse = 244;
    } else if (B !== 244) {
      throw new Error(`不支持的波段数: ${B}（需要 244 或 256）`);
    }

    // 保存全局状态
    storedH = H;
    storedW = W;
    storedBands = bandsToUse;
    storedWavelengths = wavelengthsRaw || null;

    // 6. 显示 RGB 预览（使用原始数据）
    showRGBPreview(rawDataForRGB, H, W, bandsToUse, storedWavelengths);

    // 7. 归一化原始数据（用于推理）
    normalize(rawData, GLOBAL_MEAN, GLOBAL_STD);
    storedNormalizedData = rawData;
    storedRawData = rawDataForRGB;

    // 显示推理按钮
    document.getElementById('inferROIBtn').style.display = 'block';
    document.getElementById('inferAllBtn').style.display = 'block';
    document.getElementById('inferROIBtn').disabled = false;
    document.getElementById('inferAllBtn').disabled = false;

    // 重置 ROI
    roiPolygons = [];
    currentPolygon = [];
    roiMask = null;
    redrawAll();

    status.textContent = `✓ 图像加载完毕。请在 RGB 预览图上圈画 ROI 区域。`;
    status.className = 'status ok';

  } catch(e) {
    status.textContent = `错误: ${e.message}`;
    status.className = 'status err';
    console.error(e);
  } finally {
    progressBar.style.display = 'none';
  }
}


// ═══════════════════════════════════════════════════════════
//  RGB 预览
// ═══════════════════════════════════════════════════════════
function showRGBPreview(rawData, H, W, bands, wavelengths) {
  // 找到 RGB 波段索引
  let idxR, idxG, idxB;

  if (wavelengths && wavelengths.length === bands) {
    idxR = findClosestBand(wavelengths, TARGET_R);
    idxG = findClosestBand(wavelengths, TARGET_G);
    idxB = findClosestBand(wavelengths, TARGET_B);
  } else {
    // 无波长信息时，用默认索引（256→244 裁剪后）
    idxR = 114; // 639.63 nm
    idxG = 77;  // 551.00 nm
    idxB = 42;  // 468.90 nm
  }

  const nPixels = H * W;

  // 提取 R, G, B 通道值
  const rChan = new Float32Array(nPixels);
  const gChan = new Float32Array(nPixels);
  const bChan = new Float32Array(nPixels);

  for (let p = 0; p < nPixels; p++) {
    const base = p * bands;
    rChan[p] = rawData[base + idxR];
    gChan[p] = rawData[base + idxG];
    bChan[p] = rawData[base + idxB];
  }

  // 计算各通道的 2% / 98% 百分位用于对比度拉伸
  function percentile(arr, pct) {
    const sorted = new Float32Array(arr).sort();
    const idx = Math.floor(pct / 100 * (sorted.length - 1));
    return sorted[idx];
  }

  const rMin = percentile(rChan, 2), rMax = percentile(rChan, 98);
  const gMin = percentile(gChan, 2), gMax = percentile(gChan, 98);
  const bMin = percentile(bChan, 2), bMax = percentile(bChan, 98);

  function scale(val, min, max) {
    if (max <= min) return 128;
    return Math.max(0, Math.min(255, (val - min) / (max - min) * 255));
  }

  // 绘制 RGB
  const canvas = document.getElementById('rgbCanvas');
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(W, H);

  for (let p = 0; p < nPixels; p++) {
    const off = p * 4;
    imgData.data[off]     = scale(rChan[p], rMin, rMax);
    imgData.data[off + 1] = scale(gChan[p], gMin, gMax);
    imgData.data[off + 2] = scale(bChan[p], bMin, bMax);
    imgData.data[off + 3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);

  // 设置绘图 overlay canvas
  const drawCanvas = document.getElementById('drawCanvas');
  drawCanvas.width = W;
  drawCanvas.height = H;

  // 显示预览卡片
  document.getElementById('previewCard').style.display = 'block';

  // 更新容器高度
  updateCanvasContainer();
}


// ═══════════════════════════════════════════════════════════
//  Canvas 容器尺寸
// ═══════════════════════════════════════════════════════════
function updateCanvasContainer() {
  const rgbCanvas = document.getElementById('rgbCanvas');
  const container = document.getElementById('canvasContainer');
  if (rgbCanvas.clientHeight > 0) {
    container.style.height = rgbCanvas.clientHeight + 'px';
  }
}

// 延迟更新（等图片渲染完成）
window.addEventListener('load', () => {
  setTimeout(updateCanvasContainer, 500);
});
window.addEventListener('resize', () => {
  setTimeout(updateCanvasContainer, 500);
});


// ═══════════════════════════════════════════════════════════
//  ROI 圈画（绘图 Canvas 事件）
// ═══════════════════════════════════════════════════════════
function setupDrawCanvas() {
  const canvas = document.getElementById('drawCanvas');

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) {
      if (e.touches.length === 0) return null;
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    return {
      x: Math.round((clientX - rect.left) * scaleX),
      y: Math.round((clientY - rect.top) * scaleY)
    };
  }

  function onStart(e) {
    e.preventDefault();
    const pos = getPos(e);
    if (!pos) return;
    isDrawing = true;
    currentPolygon = [pos];
    redrawAll();
  }

  function onMove(e) {
    e.preventDefault();
    if (!isDrawing) return;
    const pos = getPos(e);
    if (!pos) return;
    // 避免重复点（简单去重）
    const last = currentPolygon[currentPolygon.length - 1];
    if (last && Math.abs(pos.x - last.x) + Math.abs(pos.y - last.y) < 3) return;
    currentPolygon.push(pos);
    drawCurrentPolygon();
  }

  function onEnd(e) {
    e.preventDefault();
    if (!isDrawing) return;
    isDrawing = false;
    if (currentPolygon.length >= 3) {
      roiPolygons.push({ points: [...currentPolygon] });
      currentPolygon = [];
      redrawAll();
    } else {
      // 点数太少，丢弃
      currentPolygon = [];
      redrawAll();
    }
    document.getElementById('inferROIBtn').disabled = (roiPolygons.length === 0);
  }

  canvas.addEventListener('mousedown', onStart);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onEnd);
  canvas.addEventListener('mouseleave', onEnd);

  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onEnd, { passive: false });
}

function drawCurrentPolygon() {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  // 只 redraw 已完成的多边形 + 当前正在画的
  redrawAll();
  if (currentPolygon.length >= 1) {
    drawPolygon(ctx, currentPolygon, 'rgba(88,166,255,0.4)', 'rgba(88,166,255,0.9)', true);
  }
}

function redrawAll() {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const poly of roiPolygons) {
    drawPolygon(ctx, poly.points, 'rgba(88,166,255,0.3)', 'rgba(88,166,255,0.85)', false);
  }

  if (currentPolygon.length >= 1) {
    drawPolygon(ctx, currentPolygon, 'rgba(88,166,255,0.4)', 'rgba(88,166,255,0.9)', true);
  }
}

function drawPolygon(ctx, points, fillColor, strokeColor, isCurrent) {
  if (points.length < 1) return;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  if (!isCurrent && points.length >= 3) {
    ctx.closePath();
  }
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 2;
  ctx.setLineDash(isCurrent ? [4, 4] : []);
  ctx.stroke();
  if (!isCurrent && points.length >= 3) {
    ctx.fillStyle = fillColor;
    ctx.fill();
  }
}

function clearROI() {
  roiPolygons = [];
  currentPolygon = [];
  roiMask = null;
  redrawAll();
  document.getElementById('inferROIBtn').disabled = true;
}

function undoLastROI() {
  if (roiPolygons.length > 0) {
    roiPolygons.pop();
    redrawAll();
    document.getElementById('inferROIBtn').disabled = (roiPolygons.length === 0);
  }
}


// ═══════════════════════════════════════════════════════════
//  ROI 掩码构建
// ═══════════════════════════════════════════════════════════
function buildROIMask() {
  if (roiPolygons.length === 0) return null;
  const nPixels = storedH * storedW;
  const mask = new Uint8Array(nPixels);

  for (const poly of roiPolygons) {
    const pts = poly.points;
    if (pts.length < 3) continue;

    // 多边形包围盒
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of pts) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    minX = Math.max(0, Math.floor(minX));
    maxX = Math.min(storedW - 1, Math.ceil(maxX));
    minY = Math.max(0, Math.floor(minY));
    maxY = Math.min(storedH - 1, Math.ceil(maxY));

    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        if (pointInPolygon(x, y, pts)) {
          mask[y * storedW + x] = 1;
        }
      }
    }
  }

  return mask;
}

function pointInPolygon(px, py, polygon) {
  let inside = false;
  const n = polygon.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}


// ═══════════════════════════════════════════════════════════
//  推理：仅 ROI 区域
// ═══════════════════════════════════════════════════════════
async function runROIInference() {
  const mask = buildROIMask();
  if (!mask) {
    alert('请先在 RGB 预览图上圈画需要推理的区域');
    return;
  }
  const nSelected = mask.reduce((s, v) => s + v, 0);
  if (nSelected === 0) {
    alert('选中的区域为空，请重新圈画');
    return;
  }

  roiMask = mask;
  await runMaskedInference(mask);
}

async function runFullInference() {
  roiMask = null;
  await runMaskedInference(null);
}

async function runMaskedInference(mask) {
  const H = storedH, W = storedW, bands = storedBands;
  const nPixels = H * W;

  const status = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');

  status.textContent = '准备推理...';
  status.className = 'status';
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';

  try {
    const tStart = performance.now();

    // 收集有效像素（masked）
    let validIndices;
    if (mask) {
      validIndices = [];
      for (let i = 0; i < nPixels; i++) {
        if (mask[i]) validIndices.push(i);
      }
    } else {
      validIndices = new Array(nPixels);
      for (let i = 0; i < nPixels; i++) validIndices[i] = i;
    }

    const nValid = validIndices.length;
    if (nValid === 0) throw new Error('没有可推理的像素');

    const config = MODEL_CONFIGS[currentModel];
    const channels = config.channels;
    const featureSize = channels * bands;

    // 构建选中像素的特征
    const features = new Float32Array(nValid * featureSize);
    for (let i = 0; i < nValid; i++) {
      const pIdx = validIndices[i];
      const srcBase = pIdx * bands;
      const dstBase = i * featureSize;
      const spec = storedNormalizedData.slice(srcBase, srcBase + bands);

      if (config.deriv) {
        const d1 = sgDerivative1D(spec, SG_COEFFS_1ST);
        const d2 = sgDerivative1D(spec, SG_COEFFS_2ND);
        for (let b = 0; b < bands; b++) {
          features[(i * 3 + 0) * bands + b] = spec[b];
          features[(i * 3 + 1) * bands + b] = d1[b];
          features[(i * 3 + 2) * bands + b] = d2[b];
        }
      } else {
        for (let b = 0; b < bands; b++) {
          features[dstBase + b] = spec[b];
        }
      }
    }

    status.textContent = `推理中... 选中 ${nValid.toLocaleString()} 像素`;
    progressFill.style.width = '0%';

    // 推理
    const validPredictions = new Int32Array(nValid);
    const session = ortSession;

    for (let start = 0; start < nValid; start += BATCH_SIZE) {
      const end = Math.min(start + BATCH_SIZE, nValid);
      const count = end - start;

      const batchData = new Float32Array(count * featureSize);
      for (let p = 0; p < count; p++) {
        const srcOff = (start + p) * featureSize;
        for (let j = 0; j < featureSize; j++) {
          batchData[p * featureSize + j] = features[srcOff + j];
        }
      }

      const tensor = new ort.Tensor('float32', batchData, [count, channels, bands]);
      const feeds = { spectrum: tensor };
      const results = await session.run(feeds);
      const logits = results.logits.data;

      for (let p = 0; p < count; p++) {
        let maxVal = -Infinity, maxIdx = 0;
        for (let c = 0; c < NUM_CLASSES; c++) {
          const val = logits[p * NUM_CLASSES + c];
          if (val > maxVal) { maxVal = val; maxIdx = c; }
        }
        validPredictions[start + p] = maxIdx;
      }

      const progress = (end / nValid) * 100;
      progressFill.style.width = progress + '%';
    }

    // 构建全图预测（非 ROI 区域 = 背景 0）
    const fullPredictions = new Int32Array(nPixels);
    for (let i = 0; i < nValid; i++) {
      fullPredictions[validIndices[i]] = validPredictions[i];
    }

    const elapsed = (performance.now() - tStart) / 1000;
    const totalROI = nValid;

    // 渲染
    renderResult(fullPredictions, H, W, elapsed, totalROI);

    status.textContent = `✓ 完成！ROI ${totalROI.toLocaleString()} 像素，耗时 ${elapsed.toFixed(2)} 秒`;
    status.className = 'status ok';

  } catch(e) {
    status.textContent = `错误: ${e.message}`;
    status.className = 'status err';
    console.error(e);
  } finally {
    progressBar.style.display = 'none';
  }
}


// ═══════════════════════════════════════════════════════════
//  HDR 解析（增加 wavelength 字段）
// ═══════════════════════════════════════════════════════════
function parseHDRHeader(text) {
  const info = {};
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith(';')) continue;
    const eq = trimmed.indexOf('=');
    if (eq === -1) continue;
    const key = trimmed.substring(0, eq).trim().toLowerCase();
    const val = trimmed.substring(eq + 1).trim();
    info[key] = val;
  }

  // 解析 wavelength 数组
  let wavelengths = null;
  if (info['wavelength']) {
    // 波长值可能跨多行，从原始文本中提取
    const wlMatch = text.match(/wavelength\s*=\s*\{([^}]+)\}/s);
    if (wlMatch) {
      wavelengths = wlMatch[1]
        .split(/[\s,]+/)
        .map(v => parseFloat(v))
        .filter(v => !isNaN(v));
    }
  }

  return {
    samples:   parseInt(info['samples']) || 0,
    lines:     parseInt(info['lines']) || 0,
    bands:     parseInt(info['bands']) || 0,
    dataType:  parseInt(info['data type'] || '4'),
    byteOrder: parseInt(info['byte order'] || '0'),
    interleave: (info['interleave'] || 'bsq').toLowerCase(),
    wavelengths: wavelengths,
  };
}

function findClosestBand(wavelengths, target) {
  let bestIdx = 0, bestDiff = Infinity;
  for (let i = 0; i < wavelengths.length; i++) {
    const diff = Math.abs(wavelengths[i] - target);
    if (diff < bestDiff) {
      bestDiff = diff;
      bestIdx = i;
    }
  }
  return bestIdx;
}

function parseBinaryData(buffer, dataType, byteOrder, totalElements) {
  const isBE = (byteOrder === 1);
  const dv = new DataView(buffer);
  const result = new Float32Array(totalElements);

  switch (dataType) {
    case 1:
      const u8 = new Uint8Array(buffer);
      for (let i = 0; i < totalElements; i++) result[i] = u8[i];
      break;
    case 2:
      for (let i = 0; i < totalElements; i++) {
        result[i] = dv.getInt16(i * 2, !isBE);
      }
      break;
    case 3:
      for (let i = 0; i < totalElements; i++) {
        result[i] = dv.getInt32(i * 4, !isBE);
      }
      break;
    case 4:
      for (let i = 0; i < totalElements; i++) {
        result[i] = dv.getFloat32(i * 4, !isBE);
      }
      break;
    case 5:
      for (let i = 0; i < totalElements; i++) {
        result[i] = dv.getFloat64(i * 8, !isBE);
      }
      break;
    case 12:
      for (let i = 0; i < totalElements; i++) {
        result[i] = dv.getUint16(i * 2, !isBE);
      }
      break;
    default:
      throw new Error(`不支持的数据类型: ${dataType}`);
  }
  return result;
}

function reorderToBSQ(data, h, w, bands, interleave) {
  switch (interleave) {
    case 'bil': {
      const reordered = new Float32Array(h * w * bands);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          for (let b = 0; b < bands; b++) {
            const srcIdx = y * bands * w + b * w + x;
            const dstIdx = (y * w + x) * bands + b;
            reordered[dstIdx] = data[srcIdx];
          }
        }
      }
      return reordered;
    }
    case 'bip': {
      const reordered2 = new Float32Array(h * w * bands);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          for (let b = 0; b < bands; b++) {
            const srcIdx = y * w * bands + x * bands + b;
            const dstIdx = (y * w + x) * bands + b;
            reordered2[dstIdx] = data[srcIdx];
          }
        }
      }
      return reordered2;
    }
    case 'bsq':
    default:
      return data;
  }
}


// ═══════════════════════════════════════════════════════════
//  预处理
// ═══════════════════════════════════════════════════════════
function cropBands(data, h, w, bands) {
  const keep = bands - NOISE_START - NOISE_END;
  const result = new Float32Array(h * w * keep);
  const totalPixels = h * w;
  for (let p = 0; p < totalPixels; p++) {
    const srcBase = p * bands + NOISE_START;
    const dstBase = p * keep;
    for (let b = 0; b < keep; b++) {
      result[dstBase + b] = data[srcBase + b];
    }
  }
  return result;
}

function normalize(data, mean, std) {
  const invStd = 1.0 / std;
  for (let i = 0; i < data.length; i++) {
    data[i] = (data[i] - mean) * invStd;
  }
}

const SG_COEFFS_1ST = [ 0.2,  0.1,  0.0, -0.1, -0.2];
const SG_COEFFS_2ND = [ 0.285714, -0.142857, -0.285714, -0.142857,  0.285714];

function sgDerivative1D(spectrum, coeffs) {
  const n = spectrum.length;
  const result = new Float32Array(n);
  const w = coeffs.length;
  const half = (w - 1) / 2;
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (let j = 0; j < w; j++) {
      let idx = i + j - half;
      if (idx < 0) idx = 0;
      if (idx >= n) idx = n - 1;
      sum += spectrum[idx] * coeffs[j];
    }
    result[i] = sum;
  }
  return result;
}


// ═══════════════════════════════════════════════════════════
//  结果渲染
// ═══════════════════════════════════════════════════════════
function renderResult(predictions, H, W, elapsed, totalROI) {
  const canvas = document.getElementById('resultCanvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(W, H);

  const nPixels = H * W;
  for (let i = 0; i < nPixels; i++) {
    const label = predictions[i];
    const [r, g, b] = COLOR_MAP[label] || [0,0,0];
    const off = i * 4;
    imgData.data[off] = r;
    imgData.data[off+1] = g;
    imgData.data[off+2] = b;
    imgData.data[off+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);

  // 统计
  const counts = new Array(5).fill(0);
  for (let i = 0; i < nPixels; i++) counts[predictions[i]]++;
  const toothPixels = counts[1]+counts[2]+counts[3]+counts[4];

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="value">${elapsed.toFixed(2)}s</div><div class="label">推理耗时</div></div>
    <div class="stat"><div class="value">${totalROI.toLocaleString()}</div><div class="label">推理像素</div></div>
    <div class="stat"><div class="value">${toothPixels.toLocaleString()}</div><div class="label">牙体像素</div></div>
    <div class="stat"><div class="value">${toothPixels>0?((counts[2]+counts[3])/toothPixels*100).toFixed(1):'0'}%</div><div class="label">龋坏比例</div></div>
  `;

  document.getElementById('resultsCard').style.display = 'block';

  // 滚动到结果
  document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth' });
}

function saveResult() {
  const canvas = document.getElementById('resultCanvas');
  const link = document.createElement('a');
  link.download = 'tooth_prediction.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
