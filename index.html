<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07080a">
<meta name="mobile-web-app-capable" content="yes">
<title>ToothClassifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;510;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span class="icon">🦷</span><span><span data-i18n="title">ToothClassifier</span><span class="sub"><span data-i18n="subtitle1">Hyperspectral Dental Tissue Classification</span> · <span data-i18n="subtitle2">Edge Inference</span></span></span></h1>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light mode">
        <span class="icon-light">☀️</span>
        <span class="icon-dark">🌙</span>
      </button>
      <div class="lang-selector" id="langSelector"></div>
    </div>
  </div>

  <!-- Device info -->
  <div class="card" id="deviceCard">
    <span id="deviceLabel"></span>
  </div>

  <!-- Model -->
  <div class="card"><h2><span class="dot"></span> <span data-i18n="modelHeading">Model</span></h2>
    <select id="modelSelect">
      <option value="resnet_original" selected>ResNet-1D original (★ recommended OA≈0.944)</option>
      <option value="resnet_deriv">ResNet-1D deriv</option>
      <option value="resnet_original_se">ResNet-1D original + SE</option>
      <option value="resnet_deriv_se">ResNet-1D deriv + SE</option>
      <option value="efficientnet_original">EfficientNet-1D original</option>
      <option value="efficientnet_deriv">EfficientNet-1D deriv</option>
      <option value="simple_original">SimpleCNN original</option>
      <option value="vgg_original">VGG-1D original</option>
    </select>
    <div class="status" id="modelStatus" data-i18n="modelStatusInit"></div>
  </div>

  <!-- Operations -->
  <div class="card"><h2><span class="dot"></span> <span data-i18n="opsHeading">Operations</span></h2>
    <button class="btn-primary" id="loadModelBtn" onclick="loadModel()" data-i18n="loadModelBtn">Load Model</button>
    <div class="segmented" style="margin-top:10px" id="sourceToggle">
      <button class="active" onclick="switchSource('local')" data-i18n="sourceLocal">📁 Local File</button>
      <button onclick="switchSource('test')" data-i18n="sourceTest">🖼️ Test Images</button>
    </div>
    <div id="localPanel">
      <button class="btn-outline" id="runBtn" onclick="selectFiles()" disabled data-i18n="runBtn">Select HDR + Binary File</button>
    </div>
    <div id="testPanel" style="display:none">
      <select id="testImageSelect" onchange="onTestImageSelect()">
        <option value="" data-i18n="testSelectDefault">Loading test images...</option>
      </select>
      <div id="testImageInfo" style="display:none;margin-top:6px;font-size:.73rem;color:var(--text-dim);text-align:center"></div>
      <button class="btn-success" id="loadTestBtn" onclick="loadTestImage()" disabled style="display:none" data-i18n="loadTestBtn">📥 Load Selected Image</button>
      <div class="status" id="testStatus"></div>
    </div>
    <button class="btn-purple" id="inferROIBtn" onclick="runROIInference()" disabled style="display:none" data-i18n="inferROIBtn">Infer Selected ROI</button>
    <button class="btn-outline" id="inferAllBtn" onclick="runFullInference()" disabled style="display:none" data-i18n="inferAllBtn">Infer Entire Image</button>
    <input type="file" id="fileInput" accept=".hdr,.HDR,.dat,.img" multiple style="display:none" onchange="handleFiles(event)">
    <div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status" id="status"></div>
  </div>

  <!-- Preview + ROI -->
  <div class="card fade-in" id="previewCard" style="display:none">
    <h2><span class="dot"></span> <span data-i18n="previewHeading">RGB Preview</span></h2>
    <div class="canvas-container" id="canvasContainer">
      <canvas id="rgbCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
      <div class="hint" data-i18n="roiHint">Draw on the image to select ROI</div>
    </div>
    <div class="btn-row"><button class="btn-outline btn-sm" onclick="clearROI()" data-i18n="clearROIBtn">Clear</button><button class="btn-outline btn-sm" onclick="undoLastROI()" data-i18n="undoROIBtn">Undo</button></div>
  </div>

  <!-- Results -->
  <div class="card fade-in" id="resultsCard" style="display:none">
    <h2><span class="dot"></span> <span data-i18n="resultsHeading">Results</span></h2>
    <canvas id="resultCanvas"></canvas>
    <div class="stats" id="stats"></div><div class="legend" id="legend"></div>
    <button class="btn-outline" onclick="saveResult()" style="margin-top:10px" data-i18n="saveBtn">Save to Photos</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.webgpu.min.js"></script>
<script src="app.js"></script>
</body>
</html>
